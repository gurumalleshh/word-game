<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Word Game</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="starfield" id="starfield"></div>
    <div class="starfield starfield-2" id="starfield2"></div>
    <div class="starfield starfield-3" id="starfield3"></div>

    <div class="game-container">
        <header class="game-header floating">
            <h1>ORBITAL WORDS</h1>
            <p id="remaining-guesses-display" class="glow-text">Life Support: <span id="life-support-count">6</span> Units</p>
        </header>

        <main class="game-main">
            <div class="hint-display floating" style="animation-delay: -1s;">
                <span id="hint-text">Commencing Link...</span>
            </div>

            <div class="word-display" id="word-display">
                <!-- Letter slots will be generated here -->
            </div>

            <div class="space-debris" id="space-debris">
                <!-- Wrong letters will float here -->
            </div>

            <div class="launch-pad floating" style="animation-delay: -2s;">
                <div class="input-container">
                    <input type="text" id="letter-input" maxlength="1" autocomplete="off" placeholder="_">
                    <button id="launch-btn" class="glow-btn">LAUNCH</button>
                </div>
            </div>
            
            <div id="status-message" class="status-message hidden">
                <h2 id="status-title">Mission Accomplished!</h2>
                <button id="reorbit-btn" class="glow-btn secondary">RE-ORBIT</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
